apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-resources
  labels:
    app: node-resources
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-resources
  template:
    metadata:
      labels:
        app: node-resources
    spec:
      containers:
      - name: node-resources
        image: lcostea/node-liveness-readiness:v0.1.0
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
