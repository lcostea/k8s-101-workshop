apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: node-hello-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-hello-app
  template:
    metadata:
      labels:
        app: node-hello-app
    spec:
      containers:
      - name: node-hello-app
        image: lcostea/node-hello-app:v0.1.0
